<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeelers Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: var(--bg-secondary);
        }
        .admin-container {
            width: 90%;
            max-width: 800px;
            margin: 8rem auto 4rem;
            padding: 2.5rem;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        .admin-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }
        .admin-header .section-title {
            font-size: clamp(2rem, 5vw, 2.8rem);
            margin-bottom: 0.5rem;
        }
        .admin-header .section-desc {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .admin-container {
                padding: 1.5rem;
                margin-top: 6rem;
            }
        }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        .form-group small {
            display: block;
            margin-top: 0.4rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .form-control {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 1rem;
            background: #fff;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 3px rgba(0, 53, 82, 0.1);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 120px;
            line-height: 1.5;
        }
        .file-upload-wrapper {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        .file-input-group {
            border: 2px dashed rgba(0,0,0,0.2);
            padding: 2rem 1.5rem;
            text-align: center;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .file-input-group:hover {
            border-color: var(--brand-primary);
            background: rgba(0, 53, 82, 0.02);
        }
        .file-input-group input[type="file"] {
            display: none;
        }
        .file-icon {
            display: block;
            margin: 0 auto 1rem;
            color: var(--text-secondary);
        }
        .file-label-btn {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            background: var(--text-primary);
            color: white;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: background 0.3s;
        }
        .file-input-group:hover .file-label-btn {
            background: var(--brand-primary);
        }
        .preview-text {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.1rem;
            margin-top: 2rem;
            border-radius: var(--radius-sm);
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 53, 82, 0.2);
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 53, 82, 0.3);
        }
        
        /* Loading & Toasts */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        #loadingOverlay.active {
            visibility: visible;
            opacity: 1;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0,53,82,0.1);
            border-top-color: var(--brand-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--text-primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: var(--radius-sm);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            font-weight: 500;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.error {
            background: var(--brand-secondary);
        }
    </style>
</head>

<body>
    <!-- Navbar (simplified for admin) -->
    <header class="navbar" style="background: var(--bg-primary); border-bottom: 1px solid rgba(0,0,0,0.05);">
        <div class="nav-inner">
            <a href="index.html" class="logo">SKEELERS</a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link desktop-only">← Back to Site</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="admin-container">
            <div class="admin-header">
                <h1 class="section-title">Admin Portal</h1>
                <p class="section-desc">Add new events, news, or achievements. This automatically updates the homepage and the gallery.</p>
            </div>

            <form id="newsForm">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" name="title" class="form-control" required placeholder="e.g. Kerala State Championship">
                </div>

                <div class="form-row form-group">
                    <div>
                        <label for="date">Event Date *</label>
                        <input type="date" id="date" name="date" class="form-control" required>
                    </div>
                    <div>
                        <label for="tag">Category Tag *</label>
                        <select id="tag" name="tag" class="form-control" required>
                            <option value="Event">Event</option>
                            <option value="Achievement">Achievement</option>
                            <option value="Championship">Championship</option>
                            <option value="News">News</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="folderName">Folder Name (for images) *</label>
                    <input type="text" id="folderName" name="folderName" class="form-control" required placeholder="e.g. state-champ-2026">
                    <small>Images will be saved to images/[folder-name]/</small>
                </div>

                <div class="form-group">
                    <label for="shortDescription">Short Description (for the card on homepage) *</label>
                    <textarea id="shortDescription" name="shortDescription" class="form-control" required placeholder="Keep it brief (1-2 sentences)."></textarea>
                </div>

                <div class="form-group">
                    <label for="fullDescription">Full Description (for the popup modal) *</label>
                    <textarea id="fullDescription" name="fullDescription" class="form-control" required placeholder="Add all the details here."></textarea>
                </div>

                <div class="file-upload-wrapper">
                    <div class="form-group">
                        <label>Hero Photo (Mandatory, max 1) *</label>
                        <div class="file-input-group" onclick="document.getElementById('heroImage').click()">
                            <svg class="file-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            <span class="file-label-btn">Choose Image</span>
                            <input type="file" id="heroImage" name="heroImage" accept="image/*" required>
                            <div id="heroPreviewText" class="preview-text">No file chosen</div>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 2rem;">
                        <label>Additional Photos (Optional, max 6)</label>
                        <div class="file-input-group" onclick="document.getElementById('additionalImages').click()">
                            <svg class="file-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                            <span class="file-label-btn">Choose Images</span>
                            <input type="file" id="additionalImages" name="additionalImages" accept="image/*" multiple>
                            <div id="additionalPreviewText" class="preview-text">No files chosen</div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-primary submit-btn">Publish News & Photos</button>
            </form>
        </div>
    </main>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <h3 style="margin-top: 1rem; color: var(--brand-primary);">Uploading & Saving...</h3>
    </div>

    <div id="toast" class="toast">Success!</div>

    <script src="js/admin.js"></script>
</body>
</html>
